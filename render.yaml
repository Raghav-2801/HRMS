services:
  - type: web
    name: hrms-lite-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app

databases:
  - name: hrms-db
    databaseName: hrms_lite
    plan: free
